site_name: parawl
site_description: Southeast Asia parliamentary document crawler and parser library.
site_url: https://q3dresearch.github.io/parawl/
repo_url: https://github.com/q3dresearch/parawl
docs_dir: docs

nav:
  - Introduction: index.md
  - Architecture: ARCHITECTURE.md
  - Sources:
    - Overview: sources/index.md
    - Crawl Strategy: sources/taxonomy.md
    - Malaysia — Parliament: sources/my/parliament.md
  - Pipeline:
    - Overview: pipeline/index.md
    - Download: pipeline/download.md
    - Extract: pipeline/extract.md
    - Analyze: pipeline/analyze.md
  - Reference:
    - Operations: OPERATIONS.md

theme:
  name: material
  palette:
    primary: deep purple
    accent: purple
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy
  font:
    text: Inter

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
