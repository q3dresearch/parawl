site_name: parawl
site_description: Southeast Asia parliamentary document crawler and parser library.
site_url: https://q3dresearch.github.io/parawl/
repo_url: https://github.com/q3dresearch/parawl
docs_dir: docs

nav:
  - Home: index.md
  - Architecture: architecture/index.md
  - Sources:
    - sources/index.md
    - Crawl Strategy: sources/taxonomy.md
    - Malaysia:
      - Parliament (Bills + Hansard): sources/my/parliament.md
  - Pipeline:
    - pipeline/index.md
    - Download: pipeline/download.md
    - Extract: pipeline/extract.md
  - Tests: tests/index.md
  - Changelog: changelog/index.md
  - Reference:
    - Operations: reference/operations.md
    - Configuration: reference/config.md
    - Contributing: reference/project-use.md

theme:
  name: material
  palette:
    primary: deep purple
    accent: purple
  features:
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - content.code.copy
  font:
    text: Inter

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - meta
